<style>
body{
margin:0;
font-family:'Poppins', 'Segoe UI', Arial, sans-serif;
background: radial-gradient(circle at top, #0b1528 0%, #06070b 60%, #000000 100%);
background-attachment:fixed;
color:#e2e8f0;
padding:20px;
overflow-x:hidden;
}

.top-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    background: rgba(6, 7, 11, 0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding: 14px 20px;
    margin: -20px -20px 20px -20px;
}

.top-bar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #707e94;
    font-weight: 500;
}

.top-bar-item svg { width: 16px; height: 16px; color: #00f2fe; }

.container{
max-width:800px;
margin:auto;
position:relative;
padding:4px;
border-radius:20px;
}

.logo{ text-align:center; padding: 20px 0; }
.logo-img{ 
width:190px; 
display:block; 
margin:auto; 
filter:drop-shadow(0 6px 20px rgba(0, 114, 255, 0.3)); 
}

/* CONTENEDOR DE CONTROL CON RESPLANDOR NEÓN CIAN */
.console-box{ 
display:flex; 
justify-content:center; 
margin:25px auto; 
background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0,0,0,0) 70%);
padding: 20px;
border-radius: 24px;
width: 320px;
height: 320px;
align-items: center;
border: 1px solid rgba(0, 242, 254, 0.15);
box-shadow: 0 0 35px rgba(0, 242, 254, 0.08);
transition: all 0.5s ease;
} 

.console-box img{ 
width:260px; 
max-width:100%; 
transition: opacity 0.15s ease, transform 0.15s ease; 
filter:drop-shadow(0 15px 25px rgba(0,0,0,0.8)); 
} 

.console-box:hover {
border-color: rgba(0, 242, 254, 0.3);
box-shadow: 0 0 45px rgba(0, 242, 254, 0.15);
}

.card{
background: linear-gradient(135deg, rgba(20, 20, 25, 0.85) 0%, rgba(10, 10, 12, 0.95) 100%);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.05);
padding: 30px;
margin: 25px 0;
border-radius: 20px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

label {
display: block;
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #00f2fe;
margin-top: 20px;
margin-bottom: 8px;
font-weight: 600;
}

select,input,textarea{
width:100%;
padding: 14px 16px;
margin: 4px 0 12px 0;
border-radius:12px;
border: 1px solid rgba(255, 255, 255, 0.08);
background:#0d0f16;
color:white;
font-family: inherit;
font-size: 14px;
box-sizing: border-box;
transition: all 0.3s ease;
}

select:hover, input:hover, textarea:hover{ border-color: rgba(0, 114, 255, 0.4); }
select:focus, input:focus, textarea:focus{
outline:none;
border-color: #0072ff;
background: #121520;
box-shadow: 0 0 0 3px rgba(0, 114, 255, 0.15);
}

/* CONTENEDOR MULTI-SELECCIÓN DE SERVICIOS */
.services-checkbox-container {
    max-height: 250px;
    overflow-y: auto;
    background: #0d0f16;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 10px;
    margin: 4px 0 12px 0;
}

.services-checkbox-container::-webkit-scrollbar { width: 4px; }
.services-checkbox-container::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.3); border-radius: 4px; }

.service-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
}
.service-item:hover { background: rgba(255, 255, 255, 0.03); }

.service-item input[type="checkbox"] {
    width: auto;
    margin: 0;
    cursor: pointer;
    accent-color: #00f2fe;
    transform: scale(1.2);
}

.service-details {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 13px;
}
.service-name { color: #e2e8f0; }
.service-price { color: #00f2fe; font-weight: 500; }

button {
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:600;
font-size:14px;
font-family: inherit;
cursor:pointer;
margin-top:14px;
transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
box-sizing: border-box;
text-transform: uppercase;
letter-spacing: 0.5px;
display: flex;
align-items: center;
justify-content: center;
}

.wa { background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); color: white; }
.wa:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 114, 255, 0.35); }

.result{
background: linear-gradient(135deg, rgba(0, 114, 255, 0.1) 0%, rgba(0, 242, 254, 0.05) 100%);
border: 1px solid rgba(0, 242, 254, 0.2);
padding: 20px;
border-radius: 16px;
margin-top: 25px;
font-size: 14px;
}
.result span { font-weight: 500; color: white; }

/* LÍNEA DE DESCUENTO */
#descuentoRow {
    margin-bottom: 6px;
    color: #ef4444; 
    display: none;
}
#descuentoRow span { color: #ef4444; font-weight: 600; }

.total{
font-size: 32px;
font-weight: 700;
color: #00f2fe;
margin-top: 14px;
padding-top: 14px;
border-top: 1px solid rgba(255, 255, 255, 0.08);
display: flex;
justify-content: space-between;
align-items: center;
}
.total span { color: #00f2fe; }

/* ==========================================================================
   ESTILOS PREMIUM OPTIMIZADOS MÓVIL - EXPLOSIÓN DE PIEZAS
   ========================================================================== */
.interactive-viewer-box {
    background: linear-gradient(135deg, rgba(13, 15, 22, 0.95) 0%, rgba(6, 7, 11, 0.99) 100%);
    border: 1px solid rgba(0, 242, 254, 0.15);
    border-radius: 16px;
    padding: 20px;
    margin: 15px 0 25px 0;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.svg-viewport-wrapper {
    width: 100%;
    max-width: 440px;
    height: auto;
    margin: auto;
    position: relative;
    touch-action: manipulation; /* Optimiza toques en smartphones */
}

.hotspot {
    fill: none;
    stroke: rgba(0, 242, 254, 0.4);
    stroke-width: 2;
    cursor: pointer;
    pointer-events: auto; /* Asegura captura de eventos touch */
    transition: all 0.2s ease;
}

.hotspot:hover, .hotspot:active {
    fill: rgba(0, 242, 254, 0.15);
    stroke: #00f2fe;
    filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.7));
}

.hotspot.selected {
    fill: rgba(0, 114, 255, 0.35);
    stroke: #0072ff;
    filter: drop-shadow(0 0 12px rgba(0, 114, 255, 0.9));
}

.control-base-line {
    stroke: rgba(226, 232, 240, 0.25);
    stroke-width: 2;
    fill: none;
}

.component-info-card {
    width: 100%;
    background: #080a0f;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 14px;
    margin-top: 15px;
    box-sizing: border-box;
}

.zoom-lens-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
    border-left: 3px solid #00f2fe;
}

@media(max-width: 600px){
    body { padding: 10px; }
    .card { padding: 20px; }
    .console-box { width: 240px; height: 240px; }
    .console-box img { width: 190px; }
    .top-bar { display: none; }
    .zoom-lens-container { flex-direction: column; align-items: flex-start; gap: 6px; }
}
</style>
</head>

    "home_btn": { name: "Botón Home / Guía / Central", desc: "Módulo central de encendido, botones secundarios e iluminación LED decorativa." },
    "membrana": { name: "Gomas Conductivas / Botones", desc: "Almohadillas elásticas intermedias que devuelven el rebote físico original de los botones frontales." },
    "flex_principal": { name: "Placa Base / Circuitos Internos", desc: "Estructura lógica interna, limpieza general profunda o reparaciones complejas de encendido." }
};

let m=document.getElementById("mando");
let containerServicios=document.getElementById("serviciosContainer");
let descuentoRow=document.getElementById("descuentoRow");
let descuentoMonto=document.getElementById("descuentoMonto");

let precioElement = document.getElementById("precio");
let tiempoElement = document.getElementById("tiempo");
let totalElement = document.getElementById("total");

Object.keys(data).forEach(x=>{
    let o=document.createElement("option");
    o.value=x;
    o.textContent=x;
    m.appendChild(o);
});

function loadServices() {
    const modeloSeleccionado = m.value;
    document.getElementById("mandoImg").src = imagenes[modeloSeleccionado] || "xbox-one.png";
    containerServicios.innerHTML = "";
    
    if(!data[modeloSeleccionado]) return;
    
    data[modeloSeleccionado].forEach((servicio, index) => {
        const div = document.createElement("div");
        div.className = "service-item";
        
        const chk = document.createElement("input");
        chk.type = "checkbox";
        chk.id = `serv_${index}`;
        chk.dataset.precio = servicio[1];
        chk.dataset.tiempo = servicio[2];
        chk.dataset.tags = servicio[3] || "";
        chk.dataset.name = servicio[0];
        chk.onchange = calculateTotal;
        
        const details = document.createElement("div");
        details.className = "service-details";
        
        const nameSpan = document.createElement("span");
        nameSpan.className = "service-name";
        nameSpan.textContent = servicio[0];
        
        const priceSpan = document.createElement("span");
        priceSpan.className = "service-price";
        priceSpan.textContent = `$${servicio[1]}`;
        
        details.appendChild(nameSpan);
        details.appendChild(priceSpan);
        div.appendChild(chk);
        div.appendChild(details);
        
        div.onclick = (e) => {
            if(e.target !== chk) {
                chk.checked = !chk.checked;
                calculateTotal();
            }
        };
        
        containerServicios.appendChild(div);
    });
    
    calculateTotal();
}

function calculateTotal() {
    let subtotal = 0;
    let minutosTotales = 0;
    let horasTotales = 0;
    let serviciosSeleccionadosTags = [];
    
    const checkboxes = containerServicios.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(chk => {
        if(chk.checked) {
            subtotal += parseFloat(chk.dataset.precio);
            
            const tiempoStr = chk.dataset.tiempo;
            if(tiempoStr.includes("min")) {
                minutosTotales += parseInt(tiempoStr);
            } else if(tiempoStr.includes("hr") || tiempoStr.includes("hrs")) {
                horasTotales += parseFloat(tiempoStr);
            }
            
            if(chk.dataset.tags) {
                serviciosSeleccionadosTags.push(...chk.dataset.tags.split(","));
            }
        }
    });
    
    // Actualizar estados visuales de los hotspots basados en selección
    document.querySelectorAll('.hotspot').forEach(hotspot => {
        const compTag = hotspot.dataset.comp;
        if(serviciosSeleccionadosTags.includes(compTag)) {
            hotspot.classList.add('selected');
        } else {
            hotspot.classList.remove('selected');
        }
    });
    
    // Calcular descuento si hay más de 1 servicio
    let countChecked = Array.from(checkboxes).filter(c => c.checked).length;
    let descuento = 0;
    if(countChecked >= 2) {
        descuento = subtotal * 0.10;
        descuentoRow.style.display = "block";
        descuentoMonto.textContent = `-$${descuento.toFixed(0)}`;
    } else {
        descuentoRow.style.display = "none";
    }
    
    let total = subtotal - descuento;
    
    precioElement.textContent = `$${subtotal}`;
    totalElement.textContent = `$${total.toFixed(0)}`;
    
    // Formatear tiempo
    if(minutosTotales >= 60) {
        horasTotales += Math.floor(minutosTotales / 60);
        minutosTotales = minutosTotales % 60;
    }
    
    let tiempoFormateado = "";
    if(horasTotales > 0) {
        tiempoFormateado += `${horasTotales} hr${horasTotales > 1 ? 's' : ''} `;
    }
    if(minutosTotales > 0) {
        tiempoFormateado += `${minutosTotales} min`;
    }
    if(tiempoFormateado === "") {
        tiempoFormateado = "-";
    }
    
    tiempoElement.textContent = tiempoFormateado;
}

// Configurar interactividad de Hotspots en el SVG provisto
document.querySelectorAll('.hotspot').forEach(hotspot => {
    const compKey = hotspot.dataset.comp;
    const info = HOTSPOT_META_INFO[compKey];
    
    if(info) {
        hotspot.onmouseenter = () => {
            document.getElementById("componentVisualCard").innerHTML = `
                <div style="font-weight:600; color:#00f2fe; margin-bottom:4px;">${info.name}</div>
                <div style="color:#a0aec0; font-size:12px;">${info.desc}</div>
            `;
        };
        
        hotspot.onmouseleave = () => {
            document.getElementById("componentVisualCard").innerHTML = `
                <div style="color: #707e94; font-size:13px; text-align:center; padding:10px 0;">
                    Pasa el cursor o presiona un componente para inspección técnica detallada...
                </div>
            `;
        };
        
        hotspot.onclick = (e) => {
            e.stopPropagation();
            // Buscar si hay algún servicio asociado a este tag y activarlo
            const checkboxes = containerServicios.querySelectorAll('input[type="checkbox"]');
            let alternado = false;
            
            checkboxes.forEach(chk => {
                if(chk.dataset.tags && chk.dataset.tags.split(",").includes(compKey)) {
                    chk.checked = !chk.checked;
                    alternado = true;
                }
            });
            
            if(alternado) {
                calculateTotal();
            }
        };
    }
});

function sendWA() {
    const modelo = m.value;
    const cliente = document.getElementById("cliente").value || "Cliente";
    const obs = document.getElementById("obs").value || "Sin notas adicionales.";
    const total = totalElement.textContent;
    const tiempo = tiempoElement.textContent;
    
    let serviciosList = "";
    const checkboxes = containerServicios.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(chk => {
        if(chk.checked) {
            serviciosList += `- ${chk.dataset.name} ($${chk.dataset.precio})
`;
        }
    });
    
    if(serviciosList === "") {
        alert("Por favor selecciona al menos un servicio.");
        return;
    }
    
    const textoMensaje = `🛠️ *XE Servicio Electrónico - Presupuesto Mando*

` +
                         `👤 *Cliente:* ${cliente}
` +
                         `🎮 *Mando:* ${modelo}

` +
                         `📋 *Servicios solicitados:*
${serviciosList}
` +
                         `⏱️ *Tiempo estimado:* ${tiempo}
` +
                         `📝 *Notas/Falla:* ${obs}

` +
                         `💰 *TOTAL ESTIMADO:* ${total}

` +
                         `_Garantía y Calidad XE Electrónica_`;
                         
    const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(textoMensaje)}`;
    window.open(url, '_blank');
}

// Inicialización inicial
loadServices();
</script>
