<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XE Servicio Electrónico - Cotizador de Controles</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', 'Segoe UI', Arial, sans-serif;
background: radial-gradient(circle at top, #0b1528 0%, #06070b 60%, #000000 100%);
background-attachment:fixed;
color:#e2e8f0;
padding:20px;
overflow-x:hidden;
}

.top-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    background: rgba(6, 7, 11, 0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding: 14px 20px;
    margin: -20px -20px 20px -20px;
}

.top-bar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #707e94;
    font-weight: 500;
}

.top-bar-item svg { width: 16px; height: 16px; color: #00f2fe; }

.container{
max-width:800px;
margin:auto;
position:relative;
padding:4px;
border-radius:20px;
}

.logo{ text-align:center; padding: 20px 0; }
.logo-img{ 
width:190px; 
display:block; 
margin:auto; 
filter:drop-shadow(0 6px 20px rgba(0, 114, 255, 0.3)); 
}

/* CONTENEDOR DE CONTROL CON RESPLANDOR NEÓN CIAN */
.console-box{ 
display:flex; 
justify-content:center; 
margin:25px auto; 
background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0,0,0,0) 70%);
padding: 20px;
border-radius: 24px;
width: 320px;
height: 320px;
align-items: center;
border: 1px solid rgba(0, 242, 254, 0.15);
box-shadow: 0 0 35px rgba(0, 242, 254, 0.08);
transition: all 0.5s ease;
} 

.console-box img{ 
width:260px; 
max-width:100%; 
transition: all 0.35s ease; 
filter:drop-shadow(0 15px 25px rgba(0,0,0,0.8)); 
} 

.console-box:hover {
border-color: rgba(0, 242, 254, 0.3);
box-shadow: 0 0 45px rgba(0, 242, 254, 0.15);
}

.card{
background: linear-gradient(135deg, rgba(20, 20, 25, 0.85) 0%, rgba(10, 10, 12, 0.95) 100%);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.05);
padding: 30px;
margin: 25px 0;
border-radius: 20px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

label {
display: block;
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #00f2fe;
margin-top: 20px;
margin-bottom: 8px;
font-weight: 600;
}

select,input,textarea{
width:100%;
padding: 14px 16px;
margin: 4px 0 12px 0;
border-radius:12px;
border: 1px solid rgba(255, 255, 255, 0.08);
background:#0d0f16;
color:white;
font-family: inherit;
font-size: 14px;
box-sizing: border-box;
transition: all 0.3s ease;
}

select:hover, input:hover, textarea:hover{ border-color: rgba(0, 114, 255, 0.4); }
select:focus, input:focus, textarea:focus{
outline:none;
border-color: #0072ff;
background: #121520;
box-shadow: 0 0 0 3px rgba(0, 114, 255, 0.15);
}

button {
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:600;
font-size:14px;
font-family: inherit;
cursor:pointer;
margin-top:14px;
transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
box-sizing: border-box;
text-transform: uppercase;
letter-spacing: 0.5px;
display: flex;
align-items: center;
justify-content: center;
}

.wa { background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); color: white; }
.wa:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 114, 255, 0.35); }

.result{
background: linear-gradient(135deg, rgba(0, 114, 255, 0.1) 0%, rgba(0, 242, 254, 0.05) 100%);
border: 1px solid rgba(0, 242, 254, 0.2);
padding: 20px;
border-radius: 16px;
margin-top: 25px;
font-size: 14px;
}

.result span { font-weight: 500; color: white; }

.total{
font-size: 32px;
font-weight: 700;
color: #00f2fe;
margin-top: 14px;
padding-top: 14px;
border-top: 1px solid rgba(255, 255, 255, 0.08);
display: flex;
justify-content: space-between;
align-items: center;
}
.total span { color: #00f2fe; }

@media(max-width: 600px){
body { padding: 10px; }
.card { padding: 20px; }
.console-box { width: 240px; height: 240px; }
.console-box img { width: 190px; }
.top-bar { display: none; }
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="top-bar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Reparación de Mandos
    </div>
    <div class="top-bar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        Garantía XE Electrónica
    </div>
</div>

<div class="container">

<div class="logo"> 
    <img src="logo.png" class="logo-img"> 
    <div class="console-box"> 
        <img id="mandoImg" src="xbox-one.png"> 
    </div>
</div>

<div class="card">
<label>Modelo de Control</label>
<select id="mando" onchange="loadServices()"></select>

<label>Falla / Servicio</label>
<select id="servicio" onchange="calc()"></select>

<label>Cliente</label>
<input id="cliente" placeholder="Tu nombre">

<label>Notas adicionales</label>
<textarea id="obs" rows="3" placeholder="Ej: El joystick izquierdo se mueve solo..."></textarea>

<div class="result">
💰 Precio: <span id="precio">$0</span><br style="content: ''; margin-bottom: 6px; display: block;">
⏱ Tiempo estimado: <span id="tiempo">-</span><br>
<div class="total">TOTAL: <span id="total">$0</span></div>
</div>

<button class="wa" onclick="sendWA()">📲 Enviar Presupuesto por WhatsApp</button>
</div>

</div>

<script>
const data = {
"Control Xbox One (Fat/S/X)":[
    ["Cambio de Potenciómetro (Drift)", 300, "40 Min"],
    ["Cambio de microswitch LB o RB", 250, "20 Min"],
    ["Cambio de Botón LB/RB (Bumper)", 200, "20 Min"],
    ["Mantenimiento Completo y Limpieza", 150, "30 Min"],
    ["Cambio de Puerto de Carga Micro-USB", 250, "40 Min"],
    ["Falla de Encendido / Corto", 400, "1 a 2 días"],
    ["Cambio de Gomas Conductoras", 150, "20 Min"]
],
"Control Xbox Series (S/X)":[
    ["Cambio de Potenciómetro (Drift)", 300, "40 Min"],
    ["Cambio de Joystick TMR (Magnético)", 450, "45 Min"],
    ["Cambio de Botón LB/RB (Bumper)", 250, "20 Min"],
    ["Mantenimiento Limpieza", 50, "15 Min"],
    ["Cambio de Puerto de Carga Tipo-C", 300, "40 Min"],
    ["Problema de Sincronización / Bluetooth", 450, "1 a 2 días"]
],
"Control Xbox Elite Series 2":[
    ["Cambio de Potenciómetro (Drift)", 300, "40 Min"],
    ["Cambio de Joystick TMR (Magnético)", 450, "45 Min"],
    ["Cambio de Botón LB/RB (Bumper)", 250, "20 Min"],
    ["Mantenimiento Completo y Limpieza", 200, "30 Min"],
    ["Falla en Palancas Traseras (Paddles)", 300, "40 Min"]
],
"Control PS4 (DualShock 4)":[
    ["Cambio de Potenciómetro (Drift)", 300, "40 Min"],
    ["Cambio de Joystick TMR (Magnético)", 450, "45 Min"],
    ["Cambio de Puerto de Carga + Placa", 200, "20 Min"],
    ["Mantenimiento Completo y Limpieza", 150, "30 Min"],
    ["Cambio de Flex de Botones", 150, "20 Min"],
    ["Cambio de Batería", 250, "15 Min"]
],
"Control PS5 DualSense / Edge":[
    ["Cambio de Potenciómetro (Drift)", 300, "40 Min"],
    ["Cambio de Joystick TMR (Magnético)", 450, "45 Min"],
    ["Reparación de Gatillos Adaptativos", 350, "1 Hora"],
    ["Mantenimiento Completo y Limpieza", 250, "40 Min"],
    ["Cambio de Puerto de Carga Tipo-C", 350, "40 Min"],
    ["Falla de Encendido / Chip de Carga", 550, "1 a 2 días"]
],
"Nintendo Switch (Joy-Con)":[
    ["Cambio de Palanca Completa (Drift)", 200, "20 Min"],
    ["Cambio de Riel de Conexión", 200, "20 Min"],
    ["Cambio de Hebilla de Bloqueo (Metal)", 150, "15 Min"],
    ["Mantenimiento Individual", 100, "20 Min"]
],
"Nintendo Switch Pro Controller":[
    ["Cambio de Potenciómetro (Drift)", 300, "40 Min"],
    ["Cambio de Joystick TMR (Magnético)", 450, "45 Min"],
    ["Mantenimiento Completo y Limpieza", 200, "30 Min"],
    ["Cambio de Puerto Tipo-C", 300, "40 Min"]
]
};

const imagenes = {
"Control Xbox One (Fat/S/X)":"xbox-one.png",
"Control Xbox Series (S/X)":"xbox-series.png",
"Control Xbox Elite Series 2":"elite-series-2.png",
"Control PS4 (DualShock 4)":"dualshock-4.png",
"Control PS5 DualSense / Edge":"dualsense-edge.png",
"Nintendo Switch (Joy-Con)":"joycon.png",
"Nintendo Switch Pro Controller":"xbox-series.png"
}; 

let m=document.getElementById("mando");
let s=document.getElementById("servicio");

Object.keys(data).forEach(x=>{
    let o=document.createElement("option");
    o.value=x;
    o.textContent=x;
    m.appendChild(o);
});

loadServices();

function loadServices(){
    const targetImg = document.getElementById("mandoImg");
    targetImg.style.opacity = 0;
    targetImg.style.transform = "scale(0.9)";
    setTimeout(() => {
        targetImg.src=imagenes[m.value]; 
        targetImg.style.opacity = 1;
        targetImg.style.transform = "scale(1)";
    }, 150);

    s.innerHTML="";
    data[m.value].forEach(x=>{
        let o=document.createElement("option");
        o.value=x[0];
        o.textContent=x[0];
        s.appendChild(o);
    });
    calc();
}

function calc(){
    let d=data[m.value].find(x=>x[0]===s.value);
    if(d){
        precio.innerText="$"+d[1];
        tiempo.innerText=d[2];
        total.innerText="$"+d[1];
    }
}

function sendWA(){
    let msg=`🎮 XE SERVICIO ELECTRÓNICO\n🕹 COTIZACIÓN DE CONTROL\n\n👤 Cliente: ${cliente.value}\n🎮 Mando: ${m.value}\n🔧 Falla: ${s.value}\n\n💰 Costo: ${total.innerText}\n⏱ Tiempo: ${tiempo.innerText}\n\n📝 Notas: ${obs.value}`;
    window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
