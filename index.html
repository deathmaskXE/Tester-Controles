body{
margin:0;

background-attachment:fixed;
color:#e2e8f0;
padding:20px;
overflow-x:hidden;
}

.top-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    background: rgba(6, 7, 11, 0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding: 14px 20px;
    margin: -20px -20px 20px -20px;
}

.top-bar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #707e94;
    font-weight: 500;
}

.top-bar-item svg { width: 16px; height: 16px; color: #00f2fe; }

.container{
max-width:800px;
margin:auto;
position:relative;
padding:4px;
border-radius:20px;
}

.logo{ text-align:center; padding: 20px 0; }
.logo-img{ 
width:190px; 
display:block; 
margin:auto; 
filter:drop-shadow(0 6px 20px rgba(0, 114, 255, 0.3)); 
}

/* CONTENEDOR DE CONTROL CON RESPLANDOR NEÓN CIAN */
.console-box{ 
display:flex; 
justify-content:center; 
margin:25px auto; 
background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0,0,0,0) 70%);
padding: 20px;
border-radius: 24px;
width: 320px;
height: 320px;
align-items: center;
border: 1px solid rgba(0, 242, 254, 0.15);
box-shadow: 0 0 35px rgba(0, 242, 254, 0.08);
transition: all 0.5s ease;
} 

.console-box img{ 
width:260px; 
max-width:100%; 
transition: opacity 0.15s ease, transform 0.15s ease; 
filter:drop-shadow(0 15px 25px rgba(0,0,0,0.8)); 
} 

.console-box:hover {
border-color: rgba(0, 242, 254, 0.3);
box-shadow: 0 0 45px rgba(0, 242, 254, 0.15);
}

.card{
background: linear-gradient(135deg, rgba(20, 20, 25, 0.85) 0%, rgba(10, 10, 12, 0.95) 100%);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.05);
padding: 30px;
margin: 25px 0;
border-radius: 20px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

label {
display: block;
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #00f2fe;
margin-top: 20px;
margin-bottom: 8px;
font-weight: 600;
}

select,input,textarea{
width:100%;
padding: 14px 16px;
margin: 4px 0 12px 0;
border-radius:12px;
border: 1px solid rgba(255, 255, 255, 0.08);
background:#0d0f16;
color:white;
font-family: inherit;
font-size: 14px;
box-sizing: border-box;
transition: all 0.3s ease;
}

select:hover, input:hover, textarea:hover{ border-color: rgba(0, 114, 255, 0.4); }
select:focus, input:focus, textarea:focus{
outline:none;
border-color: #0072ff;
background: #121520;
box-shadow: 0 0 0 3px rgba(0, 114, 255, 0.15);
}

/* CONTENEDOR MULTI-SELECCIÓN DE SERVICIOS */
.services-checkbox-container {
    max-height: 250px;
    overflow-y: auto;
    background: #0d0f16;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 10px;
    margin: 4px 0 12px 0;
}

.services-checkbox-container::-webkit-scrollbar { width: 4px; }
.services-checkbox-container::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.3); border-radius: 4px; }

.service-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
}
.service-item:hover { background: rgba(255, 255, 255, 0.03); }

.service-item input[type="checkbox"] {
    width: auto;
    margin: 0;
    cursor: pointer;
    accent-color: #00f2fe;
    transform: scale(1.2);
}

.service-details {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 13px;
}
.service-name { color: #e2e8f0; }
.service-price { color: #00f2fe; font-weight: 500; }

button {
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:600;
font-size:14px;
font-family: inherit;
cursor:pointer;
margin-top:14px;
transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
box-sizing: border-box;
text-transform: uppercase;
letter-spacing: 0.5px;
display: flex;
align-items: center;
justify-content: center;
}

.wa { background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); color: white; }
.wa:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 114, 255, 0.35); }

.result{
background: linear-gradient(135deg, rgba(0, 114, 255, 0.1) 0%, rgba(0, 242, 254, 0.05) 100%);
border: 1px solid rgba(0, 242, 254, 0.2);
padding: 20px;
border-radius: 16px;
margin-top: 25px;
font-size: 14px;
}
.result span { font-weight: 500; color: white; }

/* LÍNEA DE DESCUENTO */
#descuentoRow {
    margin-bottom: 6px;
    color: #ef4444; 
    display: none;
}
#descuentoRow span { color: #ef4444; font-weight: 600; }

.total{
font-size: 32px;
font-weight: 700;
color: #00f2fe;
margin-top: 14px;
padding-top: 14px;
border-top: 1px solid rgba(255, 255, 255, 0.08);
display: flex;
justify-content: space-between;
align-items: center;
}
.total span { color: #00f2fe; }

/* ==========================================================================
   ESTILOS PREMIUM OPTIMIZADOS MÓVIL - EXPLOSIÓN DE PIEZAS

.interactive-viewer-box {
    background: linear-gradient(135deg, rgba(13, 15, 22, 0.95) 0%, rgba(6, 7, 11, 0.99) 100%);
    border: 1px solid rgba(0, 242, 254, 0.15);
    border-radius: 16px;
    padding: 20px;
    margin: 15px 0 25px 0;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.svg-viewport-wrapper {
    width: 100%;
    max-width: 440px;
    height: auto;
    margin: auto;
    position: relative;
    touch-action: manipulation; /* Optimiza toques en smartphones */
}

.hotspot {
    fill: rgba(0, 242, 254, 0.04);
    stroke: rgba(0, 242, 254, 0.3);
    stroke-width: 1.8;
    cursor: pointer;
    pointer-events: auto; /* Asegura captura de eventos touch */
    transition: all 0.2s ease;
}

.hotspot:hover, .hotspot:active {
    fill: rgba(0, 242, 254, 0.2);
    stroke: #00f2fe;
    filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.7));
}

.hotspot.selected {
    fill: rgba(0, 114, 255, 0.4);
    stroke: #0072ff;
    filter: drop-shadow(0 0 12px rgba(0, 114, 255, 0.9));
}

.component-info-card {
    width: 100%;
    background: #080a0f;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 14px;
    margin-top: 15px;
    box-sizing: border-box;
}

.zoom-lens-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
    border-left: 3px solid #00f2fe;

@media(max-width: 600px){
    body { padding: 10px; }
    .card { padding: 20px; }
    .console-box { width: 240px; height: 240px; }
    .console-box img { width: 190px; }
    .top-bar { display: none; }
    .zoom-lens-container { flex-direction: column; align-items: flex-start; gap: 6px; }

function loadServices(){
    const targetImg = document.getElementById("mandoImg");
    targetImg.style.opacity = 0;
    targetImg.style.transform = "scale(0.9)";
    setTimeout(() => {
        targetImg.src=imagenes[m.value]; 
        targetImg.style.opacity = 1;
        targetImg.style.transform = "scale(1)";
    }, 150);

    const svgContainer = document.getElementById("svgInteractiveContainer");
    svgContainer.innerHTML = getControllerSVG(m.value);

    containerServicios.innerHTML="";
    data[m.value].forEach((x, index)=>{
        let div = document.createElement("div");
        div.className = "service-item";
        div.innerHTML = `
            <input type="checkbox" id="srv_${index}" value="${x[0]}" data-hotspots="${x[3] || 'flex_principal'}" onchange="syncHotspotsFromCheckboxes(); calc();">
            <label for="srv_${index}" class="service-details">
                <span class="service-name">${x[0]}</span>
                <span class="service-price">$${x[1]}</span>
            </label>
        `;
        containerServicios.appendChild(div);
    });

    bindInteractiveHotspots();
    calc();
}

function bindInteractiveHotspots() {
    const hotspots = document.querySelectorAll('.hotspot');
    const visualCard = document.getElementById('componentVisualCard');

    hotspots.forEach(hs => {
        const key = hs.getAttribute('data-hotspot');
        const meta = HOTSPOT_META_INFO[key] || { name: key, desc: "Soporte de micro-soldadura electrónica avanzada para este segmento." };

        // Desktop Hover
        hs.addEventListener('mouseenter', () => {
            showMetaPanel(meta, visualCard);
        });

        hs.addEventListener('mouseleave', () => {
            visualCard.classList.remove('active');
        });

        // Evento híbrido unificado para soporte PC y Smartphone (Celulares)
        const handleSelection = (e) => {
            e.preventDefault();
            showMetaPanel(meta, visualCard);
            
            const checkboxes = containerServicios.querySelectorAll('input[type="checkbox"]');
            let foundMatch = false;

            checkboxes.forEach(cb => {
                const maps = cb.getAttribute('data-hotspots').split(',');
                if (maps.includes(key)) {
                    cb.checked = !cb.checked;
                    foundMatch = true;
                }
            });

            if (foundMatch) {
                syncHotspotsFromCheckboxes();
                calc();
            }
        };

        hs.addEventListener('click', handleSelection);
        hs.addEventListener('touchstart', handleSelection, { passive: false });
    });
}

function showMetaPanel(meta, cardElement) {
    cardElement.classList.add('active');
    cardElement.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <span style="font-weight:600; color:#00f2fe; font-size:14px;">⚡ Componente: ${meta.name}</span>
        </div>
        <p style="margin:0; font-size:12px; color:#cbd5e1; line-height:1.4;">${meta.desc}</p>
        <div class="zoom-lens-container">
            <div style="width:8px; height:8px; background:#00f2fe; border-radius:50%; box-shadow:0 0 6px #00f2fe;"></div>
            <div style="font-size:11px; color:#707e94;">
                <strong>Vista Ampliada XE:</strong> Instalación de precisión superficial (SMD) con aleación reforzada en laboratorio.
            </div>
        </div>
    `;
}

function syncHotspotsFromCheckboxes() {
    const hotspots = document.querySelectorAll('.hotspot');
    hotspots.forEach(hs => hs.classList.remove('selected'));

    const checkedBoxes = containerServicios.querySelectorAll('input[type="checkbox"]:checked');
    checkedBoxes.forEach(cb => {
        const maps = cb.getAttribute('data-hotspots').split(',');
        maps.forEach(hKey => {
            const targetHs = document.querySelector(`.hotspot[data-hotspot="${hKey}"]`);
            if (targetHs) {
                targetHs.classList.add('selected');
            }
        });
    });
}

function calc(){
    let totalDinero = 0;
    let listaTiempos = [];
    
    const checkboxes = containerServicios.querySelectorAll('input[type="checkbox"]:checked');
    
    checkboxes.forEach(cb => {
        let elementoData = data[m.value].find(x => x[0] === cb.value);
        if(elementoData) {
            totalDinero += elementoData[1];
            listaTiempos.push(elementoData[2]);
        }
    });

    // Apuntando de forma nativa segura a los IDs reales de la UI
    document.getElementById("precio").innerText = "$" + totalDinero;

    if(totalDinero > 460) {
        let ahorro = Math.round(totalDinero * 0.10);
        let precioFinal = totalDinero - ahorro;
        
        descuentoRow.style.display = "block";
        descuentoMonto.innerText = "-$" + ahorro;
        document.getElementById("total").innerText = "$" + precioFinal;
        promoAplicadaText = `\n🎁 Descuento 10%: -$${ahorro} (Súpero los $460)`;
    } else {
        descuentoRow.style.display = "none";
        document.getElementById("total").innerText = "$" + totalDinero;
        promoAplicadaText = "";
    }

    if(listaTiempos.length > 0) {
        document.getElementById("tiempo").innerText = listaTiempos.join(" + ");
    } else {
        document.getElementById("tiempo").innerText = "-";
    }
}

function sendWA(){
    let serviciosSeleccionados = [];
    const checkboxes = containerServicios.querySelectorAll('input[type="checkbox"]:checked');
    checkboxes.forEach(cb => serviciosSeleccionados.push(cb.value));

    let srvTexto = serviciosSeleccionados.length > 0 ? serviciosSeleccionados.join(", ") : "Ninguno seleccionado";

    let msg=`🎮 XE SERVICIO ELECTRÓNICO\n¼ DESCUENTO DE CONTROL APLICADO\n\n👤 Cliente: ${cliente.value}\n🎮 Mando: ${m.value}\n🔧 Fallas: ${srvTexto}\n\n💰 Subtotal: ${document.getElementById("precio").innerText}${promoAplicadaText}\n💵 NETO A PAGAR: ${document.getElementById("total").innerText}\n⏱ Tiempo Combinado: ${document.getElementById("tiempo").innerText}\n\n📝 Notas: ${obs.value}`;
    window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}
