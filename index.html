<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XE Servicio Electrónico - Cotizador de Controles</title>

<!-- Tipografía Premium -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', 'Segoe UI', Arial, sans-serif;
background: radial-gradient(circle at top, #0b1528 0%, #06070b 60%, #000000 100%);
background-attachment:fixed;
color:#e2e8f0;
padding:20px;
overflow-x:hidden;
}

.top-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    background: rgba(6, 7, 11, 0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding: 14px 20px;
    margin: -20px -20px 20px -20px;
}

.top-bar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #707e94;
    font-weight: 500;
}

.top-bar-item svg { width: 16px; height: 16px; color: #00f2fe; }

.container{
max-width:800px;
margin:auto;
position:relative;
padding:4px;
border-radius:20px;
}

.logo{ text-align:center; padding: 20px 0; }
.logo-img{ 
width:190px; 
display:block; 
margin:auto; 
filter:drop-shadow(0 6px 20px rgba(0, 114, 255, 0.3)); 
}

/* CONTENEDOR DE CONTROL CON RESPLANDOR NEÓN CIAN */
.console-box{ 
display:flex; 
justify-content:center; 
margin:25px auto; 
background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0,0,0,0) 70%);
padding: 20px;
border-radius: 24px;
width: 320px;
height: 320px;
align-items: center;
border: 1px solid rgba(0, 242, 254, 0.15);
box-shadow: 0 0 35px rgba(0, 242, 254, 0.08);
transition: all 0.5s ease;
} 

.console-box img{ 
width:260px; 
max-width:100%; 
transition: opacity 0.15s ease, transform 0.15s ease; 
filter:drop-shadow(0 15px 25px rgba(0,0,0,0.8)); 
} 

.console-box:hover {
border-color: rgba(0, 242, 254, 0.3);
box-shadow: 0 0 45px rgba(0, 242, 254, 0.15);
}

.card{
background: linear-gradient(135deg, rgba(20, 20, 25, 0.85) 0%, rgba(10, 10, 12, 0.95) 100%);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.05);
padding: 30px;
margin: 25px 0;
border-radius: 20px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

label {
display: block;
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #00f2fe;
margin-top: 20px;
margin-bottom: 8px;
font-weight: 600;
}

select,input,textarea{
width:100%;
padding: 14px 16px;
margin: 4px 0 12px 0;
border-radius:12px;
border: 1px solid rgba(255, 255, 255, 0.08);
background:#0d0f16;
color:white;
font-family: inherit;
font-size: 14px;
box-sizing: border-box;
transition: all 0.3s ease;
}

select:hover, input:hover, textarea:hover{ border-color: rgba(0, 114, 255, 0.4); }
select:focus, input:focus, textarea:focus{
outline:none;
border-color: #0072ff;
background: #121520;
box-shadow: 0 0 0 3px rgba(0, 114, 255, 0.15);
}

button {
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:600;
font-size:14px;
font-family: inherit;
cursor:pointer;
margin-top:14px;
transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
box-sizing: border-box;
text-transform: uppercase;
letter-spacing: 0.5px;
display: flex;
align-items: center;
justify-content: center;
}

.wa { background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); color: white; }
.wa:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 114, 255, 0.35); }

.result{
background: linear-gradient(135deg, rgba(0, 114, 255, 0.1) 0%, rgba(0, 242, 254, 0.05) 100%);
border: 1px solid rgba(0, 242, 254, 0.2);
padding: 20px;
border-radius: 16px;
margin-top: 25px;
font-size: 14px;
}

.result span { font-weight: 500; color: white; }

.total{
font-size: 32px;
font-weight: 700;
color: #00f2fe;
margin-top: 14px;
padding-top: 14px;
border-top: 1px solid rgba(255, 255, 255, 0.08);
display: flex;
justify-content: space-between;
align-items: center;
}
.total span { color: #00f2fe; }

@media(max-width: 600px){
body { padding: 10px; }
.card { padding: 20px; }
.console-box { width: 240px; height: 240px; }
.console-box img { width: 190px; }
.top-bar { display: none; }
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="top-bar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31(2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Reparación de Mandos
    </div>
    <div class="top-bar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        Garantía XE Electrónica
    </div>
</div>

<div class="container">

<div class="logo"> 
    <img src="logo.png" class="logo-img"> 
    <div class="console-box"> 
        <img id="mandoImg" src="xbox-one.png"> 
    </div>
</div>

<div class="card">
<label>Modelo de Control</label>
<select id="mando" onchange="loadServices()"></select>

<label>Falla / Servicio</label>
<select id="servicio" onchange="calc()"></select>

<label>Cliente</label>
<input id="cliente" placeholder="Tu nombre">

<label>Notas adicionales</label>
<textarea id="obs" rows="3" placeholder="Ej: El joystick izquierdo se mueve solo..."></textarea>

<div class="result">
💰 Precio: <span id="precio">$0</span><br style="content: ''; margin-bottom: 6px; display: block;">
⏱ Tiempo estimado: <span id="tiempo">-</span><br>
<div class="total">TOTAL: <span id="total">$0</span></div>
</div>

<button class="wa" onclick="sendWA()">📲 Enviar Presupuesto por WhatsApp</button>
</div>

</div>

<script>
const data = {
"Control Xbox One (Fat/S/X)":[
    ["Joystick original", 300, "10 min"],
    ["Goma conductiva (botones)", 250, "10 min"],
    ["D-pad", 150, "10 min"],
    ["Bumper LB y RB", 250, "10 min"],
    ["Gatillo hall interno", 250, "10 min"],
    ["Gatillo plástico", 150, "15 min"],
    ["Microswich LB y RB", 250, "10 min"],
    ["Puerto de carga V8", 280, "30 min"],
    ["Jack de auriculares", 200, "5 min"],
    ["Capuchón original par (gomas)", 60, "5 min"],
    ["Limpieza profunda", 80, "30 min"],
    ["Reparación electrónica", 450, "2 hrs"],
    ["Cambio de placa Power", 450, "15 min"],
    ["Cambio de placa Control", 500, "10 min"],
    ["Reparación Bluetooth", 450, "25 min"],
    ["Reballing Microprocesador", 500, "3 hrs"],
    ["Cambio de color de led", 50, "10 min"],
    ["Cambio de carcasa frontal", 300, "10 min"]
],
"Control Xbox Series (S/X)":[
    ["Joystick original", 300, "10 min"],
    ["Joystick TMR", 450, "10 min"],
    ["Goma conductiva botones", 250, "10 min"],
    ["Bumper LB y RB", 250, "5 min"],
    ["Microswich LB y RB", 250, "15 min"],
    ["Gatillo plástico", 150, "15 min"],
    ["Gatillo hall interno", 300, "20 min"],
    ["D-pad", 150, "10 min"],
    ["Puerto tipo C", 300, "30 min"],
    ["Fallas de encendido", 550, "3 hrs"],
    ["Cambio de placa Power", 480, "10 min"],
    ["Cambio de placa joysticks", 600, "10 min"],
    ["Fallas de Bluetooth", 450, "2 hrs"],
    ["Reballing a microprocesador", 550, "4 hrs"],
    ["Capuchon original par (gomas)", 60, "5 min"],
    ["Cambio de color led", 60, "10 min"],
    ["Cambio de carcasa frontal", 450, "10 min"]
],
"Control Xbox Elite Series 2":[
    ["Joystick original", 300, "10 min"],
    ["Joystick TMR", 450, "10 min"],
    ["Goma conductiva botones", 250, "10 min"],
    ["Bumper LB y RB", 250, "5 min"],
    ["Microswich LB y RB", 250, "15 min"],
    ["Mantenimiento Completo y Limpieza", 200, "30 min"],
    ["Falla en Palancas Traseras (Paddles)", 300, "40 min"]
],
"Control PS4 (DualShock 4)":[
    ["Joystick", 300, "10 min"],
    ["Joystick TMR", 450, "10 min"],
    ["Membrana de botones", 300, "20 min"],
    ["Goma condutivas", 200, "10 min"],
    ["Gatillo aptico", 450, "1 hr"],
    ["Flex gatillo", 300, "5 min"],
    ["Centro de carga tipo C", 300, "30 min"],
    ["Puerto audífonos", 300, "15 min"],
    ["Pmic", 600, "1 hr"],
    ["Corto en placa", 500, "2 hrs"]
],
"Control PS5 DualSense":[
    ["Joystick", 300, "10 min"],
    ["Joystick TMR", 450, "10 min"],
    ["Membrana de botones", 250, "20 min"],
    ["Goma conductiva", 200, "10 min"],
    ["Motor adaptativo", 450, "1 hr"],
    ["Motor aptico", 450, "1 hr"],
    ["Gatillo aptico", 450, "1 hr"],
    ["Flex gatillo", 300, "5 min"],
    ["Centro de carga tipo C", 300, "30 min"],
    ["Jack de audífonos", 300, "15 min"],
    ["Pmic", 650, "1 hr"],
    ["Corto en placa", 500, "2 hrs"]
],
"Control PS5 DualSense Edge":[
    ["Joystick original", 450, "10 min"],
    ["Joystick TMR", 600, "10 min"],
    ["Gatillo adaptative", 700, "1 hr"],
    ["Motor adaptativo", 700, "1 hr"],
    ["Motor haptico", 450, "30 min"],
    ["Membrana de botones", 500, "1 hr"],
    ["Jack de audífonos", 450, "45 min"],
    ["Pmic", 1500, "1 hr"]
],
"Nintendo Switch (Joy-Con)":[
    ["Joystick original", 300, "10 min"],
    ["Joystick TMR", 450, "10 min"],
    ["Flex vinculación inalámbrica", 350, "10 min"],
    ["Riel", 400, "10 min"],
    ["Batería", 400, "5 min"],
    ["Carcasa", 280, "20 min"]
],
"Nintendo Switch Pro Controller":[
    ["Joystick original", 300, "10 min"],
    ["Joystick TMR", 450, "10 min"],
    ["Puerto de carga", 400, "30 min"],
    ["Goma conductiva", 300, "15 min"],
    ["Corto en placa", 450, "2 hrs"]
]
};

const imagenes = {
"Control Xbox One (Fat/S/X)":"xbox-one.png",
"Control Xbox Series (S/X)":"xbox-series.png",
"Control Xbox Elite Series 2":"elite-series-2.png",
"Control PS4 (DualShock 4)":"dualshock-4.png",
"Control PS5 DualSense":"dualsense-edge.png",
"Control PS5 DualSense Edge":"dualsense-edge.png",
"Nintendo Switch (Joy-Con)":"joycon.png",
"Nintendo Switch Pro Controller":"pro-controller.png"
}; 

let m=document.getElementById("mando");
let s=document.getElementById("servicio");

Object.keys(data).forEach(x=>{
    let o=document.createElement("option");
    o.value=x;
    o.textContent=x;
    m.appendChild(o);
});

loadServices();

function loadServices(){
    const targetImg = document.getElementById("mandoImg");
    targetImg.style.opacity = 0;
    targetImg.style.transform = "scale(0.9)";
    setTimeout(() => {
        targetImg.src=imagenes[m.value]; 
        targetImg.style.opacity = 1;
        targetImg.style.transform = "scale(1)";
    }, 150);

    s.innerHTML="";
    data[m.value].forEach(x=>{
        let o=document.createElement("option");
        o.value=x[0];
        o.textContent=x[0];
        s.appendChild(o);
    });
    calc();
}

function calc(){
    let d=data[m.value].find(x=>x[0]===s.value);
    if(d){
        precio.innerText="$"+d[1];
        tiempo.innerText=d[2];
        total.innerText="$"+d[1];
    }
}

// Envío limpio estructurado para WhatsApp
function sendWA(){
    let msg=`🎮 XE SERVICIO ELECTRÓNICO\n🕹 COTIZACIÓN DE CONTROL\n\n👤 Cliente: ${cliente.value}\n🎮 Mando: ${m.value}\n🔧 Falla: ${s.value}\n\n💰 Costo: ${total.innerText}\n⏱ Tiempo: ${tiempo.innerText}\n\n📝 Notas: ${obs.value}`;
    window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
